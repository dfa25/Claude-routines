name: Claude Routine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Create or update a file called DAILY_REPORT.md.
            Summarise what is in this repository.
