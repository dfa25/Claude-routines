name: Daily New User Report — UK

on:
  schedule:
    - cron: '0 11 * * *'  # 12pm London (BST). Drifts to 1pm during GMT (Oct–Mar).
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours of history to pull (default 24; use 720 for one-off 30-day backfill)'
        required: false
        default: '24'

permissions:
  contents: write

concurrency:
  group: intercom-snapshots
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run daily Intercom report (UK)
        env:
          INTERCOM_ACCESS_TOKEN: ${{ secrets.INTERCOM_ACCESS_TOKEN }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          REGION: UK
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: python scripts/daily_intercom_report.py
      - name: Commit daily snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add data/snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: daily Intercom snapshot (UK) $(date -u +%Y-%m-%d)"
            for i in 1 2 3 4; do
              git push && break || { echo "push failed, retry $i"; sleep $((2**i)); git pull --rebase origin ${{ github.ref_name }} || true; }
            done
          fi
